<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Check-In Anggara & Tsamara Wedding</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h2{margin-top:20px;}

#reader{
width:100%;
max-width:500px;
margin:auto;
}

#result{
margin-top:20px;
font-size:18px;
}

.success{color:#4CAF50;}
.error{color:#ff5252;}
.loading{color:#ffd54f;}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-box{
background:#fff;
color:#000;
padding:25px;
border-radius:15px;
width:300px;
text-align:center;
animation:pop 0.2s ease;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.modal-box h2{
margin-bottom:10px;
}

.modal-box button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#28a745;
color:#fff;
border-radius:8px;
cursor:pointer;
}
.hidden{display:none;}
</style>
</head>

<body>

<h2>Wedding QR Scanner</h2>

<div id="reader"></div>

<div id="result">Silahkan Scan QR</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/pop.ogg">
</audio>

<!-- ✅ MODAL HARUS DI LUAR SCRIPT -->
<div id="scanModal" class="modal hidden">
  <div class="modal-box">
    <h2>✅ CHECK-IN BERHASIL</h2>
    <p><b>Nama:</b> <span id="guestName"></span></p>
    <p><b>Jam:</b> <span id="checkinTime"></span></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>

const WEBAPP="https://script.google.com/macros/s/AKfycbwfz-rbBxKY-uPOkTvTCl7lLLIemCh-_eqSfP4oXADE18s1CpjfpPqbeTZX6rJk5Pjwag/exec";

let lastCode="";
let scanning=true;

const result=document.getElementById("result");
const beep=document.getElementById("beep");

function playBeep(){
beep.currentTime=0;
beep.play();
}

function showMessage(msg,cls){
result.className=cls;
result.innerHTML=msg;
}

/* ✅ MODAL */
function showModal(name,time){
document.getElementById("guestName").innerText=name;
document.getElementById("checkinTime").innerText=time;
document.getElementById("scanModal").classList.remove("hidden");
}

function closeModal(){
document.getElementById("scanModal").classList.add("hidden");
}

/* ✅ SEND DATA */
async function sendCheckin(code){

showMessage("Mengirim data...","loading");

try{

const formData = new URLSearchParams();
const response = await fetch(WEBAPP,{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        action:"checkin",
        qr:code
    })
});
  
const text=await response.text();
const data=JSON.parse(text);

playBeep();

const now=new Date();
const timeString=now.toLocaleString("id-ID",{
dateStyle:"full",
timeStyle:"medium"
});

if(data.status===true){

// ambil nama dari server (WAJIB ada di backend kamu)
const name = data.name || "Tamu";

showMessage("✅ Check-in sukses","success");

// tampilkan modal
showModal(name,timeString);

}else{
showMessage("❌ "+data.message,"error");
}

}catch(e){
showMessage("Server Error: "+e.message,"error");
}

}

/* ✅ SCAN */
function onScanSuccess(decodedText){

if(!scanning)return;
if(decodedText===lastCode)return;

lastCode=decodedText;
scanning=false;

vibrateSuccess();
  
sendCheckin(decodedText);

setTimeout(()=>{
scanning=true;
lastCode="";
},3000);

}

function onScanFailure(error){}

function showScanSuccess(guestName) {
  const now = new Date();

  const timeString = now.toLocaleString("id-ID", {
    dateStyle: "full",
    timeStyle: "medium"
  });

  document.getElementById("guestName").innerText = guestName;
  document.getElementById("checkinTime").innerText = timeString;

  document.getElementById("scanModal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("scanModal").classList.add("hidden");
}


function vibrateSuccess(){
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200]);
  }
}

// unlock sekali
document.addEventListener("click", () => {
  if (navigator.vibrate) navigator.vibrate(50);
}, { once: true });
  
/* QR START */
const html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode:"environment" },
{ fps:10, qrbox:{width:250,height:250} },
onScanSuccess,
onScanFailure
);

</script>

</body>
</html>
