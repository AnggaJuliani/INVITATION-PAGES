<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Konfirmasi Kehadiran</title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Konfirmasi Kehadiran</h1>

        <p>Mohon konfirmasi kehadiran Anda.</p>

        <hr>

        <div class="guest">

            <small>Nama Tamu</small>

            <h2 id="guestName">

                Memuat...

            </h2>

        </div>

        <div class="form-group">

            <label>

                Apakah Anda akan hadir?

            </label>

            <select id="attendance">

                <option value="Hadir">

                    Ya, Saya Hadir

                </option>

                <option value="Tidak Hadir">

                    Maaf, Tidak Bisa Hadir

                </option>

            </select>

        </div>

        <div class="form-group">

            <label>

                Jumlah Tamu

            </label>

            <select id="guestCount">

                <option value="1">1 Orang</option>
                <option value="2">2 Orang</option>
                <option value="3">3 Orang</option>
                <option value="4">4 Orang</option>

            </select>

        </div>

        <div class="form-group">

            <label>

                Ucapan & Doa

            </label>

            <textarea
                id="message"
                rows="5"
                placeholder="Tuliskan ucapan terbaik..."></textarea>

        </div>

        <button id="submitRSVP">

            Konfirmasi Kehadiran

        </button>

        <div id="status"></div>

    </div>

</div>

<script>

const API="https://your-backend-url.up.railway.app";

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

async function loadGuest(){

    if(!id){

        alert("ID tamu tidak ditemukan.");

        location.href="index.html";

        return;

    }

    try{

        const res=await fetch(`${API}/guest/${id}`);

        const data=await res.json();

        if(data.success){

            document.getElementById("guestName").innerHTML=data.name;

        }else{

            alert("Data tamu tidak ditemukan.");

            location.href="index.html";

        }

    }

    catch{

        alert("Server tidak dapat dihubungi.");

    }

}

loadGuest();

document
.getElementById("submitRSVP")
.addEventListener("click",async()=>{

    const attendance=document
        .getElementById("attendance")
        .value;

    const guestCount=document
        .getElementById("guestCount")
        .value;

    const message=document
        .getElementById("message")
        .value;

    document.getElementById("status")
        .innerHTML="Mengirim data...";

    try{

        const res=await fetch(`${API}/rsvp`,{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                id:id,

                attendance:attendance,

                guestCount:guestCount,

                message:message

            })

        });

        const data=await res.json();

        if(data.success){

            document.getElementById("status")
            .innerHTML="✔ Konfirmasi berhasil.";

            setTimeout(()=>{

                location.href=`barcode.html?id=${id}`;

            },1000);

        }

        else{

            document.getElementById("status")
            .innerHTML=data.message;

        }

    }

    catch(e){

        document.getElementById("status")
        .innerHTML="Terjadi kesalahan.";

    }

});

</script>

</body>

</html>
