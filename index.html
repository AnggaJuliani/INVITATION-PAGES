<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Invitation | Anggara Wisnu Wardhana & Tsamara Alifia Ramadhani</title>

    <meta name="description"
        content="Undangan Pernikahan Anggara Wisnu Wardhana & Tsamara Alifia Ramadhani">

    <meta name="theme-color" content="#b58b5a">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Background -->
    <div class="background"></div>
    <div class="overlay"></div>

    <!-- Floating Flowers -->
    <div class="flowers">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Cover -->
    <section class="cover">

        <div class="cover-content">

            <p class="subtitle fade-up">
                THE WEDDING OF
            </p>

            <h1 class="title fade-up">
                Anggara Wisnu Wardhana
            </h1>

            <div class="and fade-up">&</div>

            <h1 class="title fade-up">
                Tsamara Alifia Ramadhani
            </h1>

            <div class="divider fade-up"></div>

            <p class="date fade-up">
                Minggu, 1 Januari 2020
            </p>

            <div class="guest-box fade-up">

                <small>Kepada Yth.</small>

                <h2 id="guestName">
                    Tamu Undangan
                </h2>

            </div>

            <button id="openInvitation" class="btn-open fade-up">

                💌 Buka Undangan

            </button>

            <p class="note fade-up">

                Mohon maaf apabila terdapat kesalahan penulisan nama atau gelar.

            </p>

        </div>

    </section>

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="music/wedding.mp3" type="audio/mpeg">
    </audio>

    <script>

        // Ambil nama tamu dari URL
        // contoh:
        // index.html?to=Bapak%20Andi

        const params = new URLSearchParams(window.location.search);

        const guest = params.get("to");

        if (guest) {

            document.getElementById("guestName").innerHTML =
                decodeURIComponent(guest.replace(/\+/g, " "));

        }

        const button = document.getElementById("openInvitation");

        const music = document.getElementById("bgMusic");

        button.addEventListener("click", () => {

            music.play().catch(() => { });

            setTimeout(() => {

                window.location.href =
                    "invitation.html" + window.location.search;

            }, 600);

        });

    </script>

</body>

</html>
