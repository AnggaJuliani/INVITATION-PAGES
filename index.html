    <!-- CSS -->

    <link rel="stylesheet" href="CSS/reset.css">

    <link rel="stylesheet" href="CSS/variables.css">

    <link rel="stylesheet" href="CSS/hero.css">

    <link rel="stylesheet" href="CSS/animation.css">

    <link rel="stylesheet" href="CSS/responsive.css">

</head>

<body>

    <!-- ===========================
         Loading Screen
    ============================ -->

    <div id="loading"
         class="flex-center">

        <div class="loader"></div>

    </div>

    <!-- ===========================
         Hero Section
    ============================ -->

    <header class="hero">

        <!-- Glow -->

        <div class="hero-glow"></div>

        <!-- Decorative Flower -->

        <img src="images/flower-left.png"
             class="flower-left"
             alt="Flower Decoration">

        <img src="images/flower-right.png"
             class="flower-right"
             alt="Flower Decoration">

        <!-- Floating Particles -->

        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="container">

            <div class="hero-content">

                <p class="small-text">

                    THE WEDDING OF

                </p>

                <h1>

                    Anggara Wisnu Wardhana

                    <span>&</span>

                    Tsamara Alifia Ramadhani

                </h1>

                <p class="date">

                    Minggu, 20 September 2026

                </p>

                <div class="hero-divider"></div>

                <div class="guest-box">

                    <small>

                        Kepada Yth.

                    </small>

                    <h2 id="guestName">

                        Memuat Nama Tamu...

                    </h2>

                </div>

                <p class="hero-description">

                    Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila
                    Bapak/Ibu/Saudara/i berkenan hadir untuk memberikan doa restu
                    pada hari bahagia kami.

                </p>

                <div class="hero-buttons">

                    <button
                        id="openInvitation"
                        class="btn"
                        aria-label="Buka Undangan">

                        💌 Buka Undangan

                    </button>

                </div>

            </div>

        </div>

        <!-- Scroll Indicator -->

        <a href="#nextSection"
           class="scroll-indicator">

            <span>

                Scroll

            </span>

            <div class="scroll-mouse"></div>

        </a>

    </header>

    <!-- ===========================
         Background Music
    ============================ -->

    <audio id="bgMusic"
           preload="auto"
           loop>

        <source src="music/wedding.mp3"
                type="audio/mpeg">

        Browser Anda tidak mendukung audio.

    </audio>

    <!-- Floating Music Button -->

    <button
        id="musicButton"
        class="music-button"
        aria-label="Music">

        🎵

    </button>

    <!-- Javascript akan dilanjutkan
         pada INDEX FINAL PART 2 -->

        <!-- ===========================
         Main Javascript
    ============================ -->

    <script>

        /* ============================================
           CONFIGURATION
        ============================================ */

        const API = "https://your-backend-url.up.railway.app";

        const params = new URLSearchParams(window.location.search);

        const guestId = params.get("id");

        const guestName = document.getElementById("guestName");

        const loading = document.getElementById("loading");

        const music = document.getElementById("bgMusic");

        const musicButton = document.getElementById("musicButton");

        const openInvitation = document.getElementById("openInvitation");


        /* ============================================
           LOAD GUEST
        ============================================ */

        async function loadGuest() {

            if (!guestId) {

                guestName.innerHTML = "Tamu Undangan";

                return;

            }

            try {

                const response = await fetch(`${API}/guest/${guestId}`);

                if (!response.ok)
                    throw new Error("Network Error");

                const data = await response.json();

                if (data.success) {

                    guestName.textContent = data.name;

                    document.title =
                        `Undangan Untuk ${data.name} | Anggara & Tsamara`;

                }
                else {

                    guestName.textContent = "Nama Tidak Ditemukan";

                }

            }

            catch (err) {

                console.error(err);

                guestName.textContent = "Server Tidak Terhubung";

            }

        }


        /* ============================================
           OPEN INVITATION
        ============================================ */

        openInvitation.addEventListener("click", async () => {

            try {

                await music.play();

                musicButton.classList.add("playing");

            } catch (e) {

                console.log("Autoplay diblokir browser.");

            }

            setTimeout(() => {

                if (guestId) {

                    location.href = `invitation.html?id=${guestId}`;

                }
                else {

                    location.href = "invitation.html";

                }

            }, 600);

        });


        /* ============================================
           MUSIC BUTTON
        ============================================ */

        musicButton.addEventListener("click", async () => {

            if (music.paused) {

                try {

                    await music.play();

                    musicButton.classList.add("playing");

                    musicButton.innerHTML = "🔊";

                } catch (err) {

                    console.log(err);

                }

            }
            else {

                music.pause();

                musicButton.classList.remove("playing");

                musicButton.innerHTML = "🎵";

            }

        });


        /* ============================================
           LOADING SCREEN
        ============================================ */

        window.addEventListener("load", () => {

            loadGuest();

            setTimeout(() => {

                loading.style.opacity = "0";

                setTimeout(() => {

                    loading.style.display = "none";

                }, 500);

            }, 500);

        });


        /* ============================================
           DISABLE RIGHT CLICK (OPTIONAL)
        ============================================ */

        /*
        document.addEventListener("contextmenu", e => {

            e.preventDefault();

        });
        */


        /* ============================================
           PRELOAD NEXT PAGE
        ============================================ */

        const preload = document.createElement("link");

        preload.rel = "prefetch";

        preload.href = "invitation.html";

        document.head.appendChild(preload);


        /* ============================================
           SCROLL ANIMATION
        ============================================ */

        document.querySelector(".scroll-indicator")
            .addEventListener("click", function (e) {

                e.preventDefault();

                openInvitation.click();

            });

    </script>

</body>

</html>
