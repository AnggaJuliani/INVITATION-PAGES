<body>

    <div id="loader">

    <p>Loading...</p>

    <!-- Cover -->

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="cover-card">

        <div class="cover-content">
        </div>
        </div>
        
            <p class="subtitle fade-up">
                THE WEDDING OF
            </p>

            <h1 class="title fade-up">
                Anggara Wisnu Wardhana, S.H
            </h1>

            <div class="and fade-up">&</div>

            <h1 class="title fade-up">
                Tsamara Alifia Ramadhani, S.Gz

            <div class="divider fade-up"></div>

            <p class="date fade-up">
                Minggu, 1 Januari 2027

            <div class="guest-box fade-up">

                <small>Kepada Yth.</small>

                <h2 id="guestName">
                    Tamu Undangan

            </div>

            <button id="openInvitation" class="btn-open fade-up">

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="music/wedding.mp3" type="audio/mpeg">
    </audio>

    <script>

        // Ambil kode tamu dari URL
const params = new URLSearchParams(window.location.search);
const guestCode = (params.get("to") || "").trim().toLowerCase();

const GUEST_API =
  "https://raw.githubusercontent.com/AnggaJuliani/INVITATION-PAGES/main/guest.json";

async function loadGuest() {
    try {
        const res = await fetch(GUEST_API);
        const guests = await res.json();

        if (!guestCode) return;

        const foundGuest = guests.find(g =>
            (g.kode || "").toLowerCase() === guestCode
        );

        document.getElementById("guestName").innerText =
            foundGuest ? foundGuest.nama : "Tamu Undangan";

    } catch (error) {
        console.error("Gagal load guest.json:", error);
        document.getElementById("guestName").innerText = "Tamu Undangan";
    }
}

loadGuest();
        
        const button = document.getElementById("openInvitation");

        const music = document.getElementById("bgMusic");

        button.addEventListener("click", () => {

            music.play().catch(() => { });

            setTimeout(() => {

                window.location.href =
                    "invitation.html" + window.location.search;

            }, 600);

        });

    </script>

</body>
