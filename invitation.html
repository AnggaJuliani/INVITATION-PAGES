<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Invitation</title>

    <!-- CSS tetap pakai punyamu -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/premium.css">
</head>

<body>

    <!-- Background tetap sama -->
    <div class="background"></div>
    <div class="overlay"></div>

    <!-- MUSIC (lanjutan dari halaman sebelumnya) -->
    <audio id="bgMusic" loop>
        <source src="music/wedding.mp3" type="audio/mpeg">
    </audio>

    <!-- MAIN CONTENT -->
    <div class="invitation-container">

        <!-- HERO -->
        <section class="hero-section fade-up">

            <h1 class="title">
                Wedding Invitation
            </h1>

            <p class="subtitle">
                Dengan penuh rasa syukur kami mengundang Anda
            </p>

        </section>

        <!-- PROFILE MEMPELAI -->
        <section class="couple-section fade-up">

            <div class="couple-grid">

                <!-- PRIA -->
                <div class="couple-card">
                    <div class="avatar"></div>
                    <h2>Anggara Wisnu Wardhana</h2>
                    <p>Mempelai Pria</p>
                </div>

                <!-- WANITA -->
                <div class="couple-card">
                    <div class="avatar"></div>
                    <h2>Tsamara Alifia Ramadhani</h2>
                    <p>Mempelai Wanita</p>
                </div>

            </div>

        </section>

        <!-- DETAIL ACARA -->
        <section class="event-section fade-up">

            <h2>Detail Acara</h2>

            <div class="event-box">

                <p><b>Gedung:</b> Gedung Serbaguna Anggun</p>
                <p><b>Alamat:</b> Jl. Contoh No. 123, Surabaya</p>
                <p><b>Tanggal:</b> Minggu, 1 Januari 2020</p>
                <p><b>Waktu:</b> 10.00 WIB - Selesai</p>

            </div>

        </section>

    </div>

    <!-- SCRIPT MUSIC LANJUT -->
    <script>
        const music = document.getElementById("bgMusic");

        // lanjutkan musik dari halaman sebelumnya
        window.addEventListener("load", async () => {
            music.volume = 0.7;

            try {
                await music.play();
            } catch (e) {
                console.log("Autoplay diblokir browser");
            }
        });
    </script>

</body>

</html>
